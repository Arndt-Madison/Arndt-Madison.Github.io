<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Prism Bloom Exercise Interactive Flyer</title>
	<style>
		:root {
			--flyer-width: min(96vw, 760px);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #111;
			font-family: Arial, sans-serif;
		}

		.flyer-wrap {
			position: relative;
			width: var(--flyer-width);
			max-width: 100%;
		}

		.flyer-base {
			display: block;
			width: 100%;
			height: auto;
		}

		/*
			ICON POSITION NOTES
			- left/top/width are percentages of the flyer image.
			- Move an icon horizontally by changing left.
			- Move an icon vertically by changing top.
			- Resize an icon by changing width.
			- Icons are real transparent PNG assets from the Pixlr .pxz file.
			- Links with href="#" are placeholders for you to replace.
		*/
		.icon-link {
			position: absolute;
			display: block;
			z-index: 5;
			line-height: 0;
			text-decoration: none;
			transform: translate(-50%, -50%);
			-webkit-tap-highlight-color: transparent;
		}

		.icon-link img {
			display: block;
			width: 100%;
			height: auto;
			pointer-events: none;
		}

		.icon-link:hover,
		.icon-link:focus-visible {
			filter: drop-shadow(0 0 8px rgba(182,255,91,0.8));
			transform: translate(-50%, -50%) scale(1.05);
			outline: none;
		}

		/* Event/calendar icon positions */
		.event-calendar { left: 15.0%; top: 61.0%; width: 9.5%; }
		.event-calendar-clock { left: 31.0%; top: 79.2%; width: 11.5%; }

		/* Social icon positions */
		.discord-icon { left: 56.4%; top: 66.5%; width: 10.2%; }
		.facebook-icon { left: 56.5%; top: 77.7%; width: 8.5%; }
		.instagram-icon { left: 69.6%; top: 77.7%; width: 10.2%; }
		.snapchat-icon { left: 82.9%; top: 77.7%; width: 9.6%; }

		@media (max-width: 520px) {
			:root {
				--flyer-width: 100vw;
			}
		}
	</style>
</head>
